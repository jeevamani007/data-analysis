<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Domain Classification Model</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .auth-container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .auth-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .auth-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-label .required {
            color: var(--danger);
        }

        .form-input {
            width: 100%;
            padding: 1rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-primary-light);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .password-toggle {
            position: relative;
        }

        .password-toggle-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.5rem;
            transition: color 0.2s ease;
        }

        .password-toggle-btn:hover {
            color: var(--accent-primary);
        }

        .form-input.password-input {
            padding-right: 3.5rem;
        }

        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .password-strength.weak {
            color: var(--danger);
        }

        .password-strength.medium {
            color: var(--warning);
        }

        .password-strength.strong {
            color: var(--success);
        }

        .btn-auth {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-primary-dark));
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(15, 118, 110, 0.35);
            margin-top: 0.5rem;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15, 118, 110, 0.4);
        }

        .btn-auth:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
        }

        .auth-footer p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s ease;
        }

        .auth-footer a:hover {
            color: var(--accent-primary-dark);
            text-decoration: underline;
        }

        .error-message {
            background: var(--danger-light);
            color: var(--danger);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            border: 1px solid var(--danger);
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: var(--success-light);
            color: var(--success);
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 1.5rem;
            border: 1px solid var(--success);
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner-small {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            transition: color 0.2s ease;
        }

        .back-link:hover {
            color: var(--accent-primary);
        }

        .back-link::before {
            content: "←";
            margin-right: 0.5rem;
            font-size: 1.2rem;
        }

        .form-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <section class="section active">
        <div class="auth-container">
            <a href="index.html" class="back-link">Back to Home</a>

            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-icon">✨</div>
                    <h1>Create Account</h1>
                    <p>Sign up to start analyzing your databases</p>
                </div>

                <div id="errorMessage" class="error-message"></div>
                <div id="successMessage" class="success-message"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullName" class="form-label">Full Name <span class="required">(Optional)</span></label>
                        <input 
                            type="text" 
                            id="fullName" 
                            class="form-input" 
                            placeholder="John Doe"
                            autocomplete="name"
                        >
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">Email Address <span class="required">*</span></label>
                        <input 
                            type="email" 
                            id="email" 
                            class="form-input" 
                            placeholder="your.email@example.com"
                            required
                            autocomplete="email"
                        >
                        <div class="form-hint">We'll never share your email with anyone</div>
                    </div>

                    <div class="form-group">
                        <label for="username" class="form-label">Username <span class="required">*</span></label>
                        <input 
                            type="text" 
                            id="username" 
                            class="form-input" 
                            placeholder="johndoe"
                            required
                            autocomplete="username"
                            minlength="3"
                            maxlength="100"
                        >
                        <div class="form-hint">3-100 characters, letters/numbers plus <code>_</code> <code>.</code> <code>-</code></div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Password <span class="required">*</span></label>
                        <div class="password-toggle">
                            <input 
                                type="password" 
                                id="password" 
                                class="form-input password-input" 
                                placeholder="Enter 4-digit PIN (0-9)"
                                required
                                autocomplete="new-password"
                                minlength="4"
                                maxlength="4"
                                pattern="[0-9]{4}"
                                inputmode="numeric"
                            >
                            <button type="button" class="password-toggle-btn" id="togglePassword">
                                👁️
                            </button>
                        </div>
                        <div id="passwordStrength" class="password-strength"></div>
                        <div class="form-hint">Enter exactly 4 digits (numbers only: 0-9)</div>
                    </div>

                    <button type="submit" class="btn-auth" id="signupBtn">
                        <span id="signupBtnText">Create Account</span>
                    </button>
                </form>

                <!-- OAuth Signup Buttons -->
                <div style="margin: 2rem 0; text-align: center; position: relative;">
                    <div style="display: flex; align-items: center; margin-bottom: 1rem;">
                        <div style="flex: 1; height: 1px; background: var(--border);"></div>
                        <span style="padding: 0 1rem; color: var(--text-muted); font-size: 0.9rem;">OR</span>
                        <div style="flex: 1; height: 1px; background: var(--border);"></div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                        <button 
                            type="button" 
                            id="googleSignupBtn" 
                            style="width: 100%; padding: 1rem; background: white; border: 2px solid var(--border); border-radius: var(--radius); font-size: 1rem; font-weight: 600; color: var(--text-primary); cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.75rem;"
                            onmouseover="this.style.borderColor='var(--accent-primary)'; this.style.boxShadow='0 0 0 4px var(--accent-primary-light)'"
                            onmouseout="this.style.borderColor='var(--border)'; this.style.boxShadow='none'"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24">
                                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                            </svg>
                            Sign up with Google
                        </button>
                        <button 
                            type="button" 
                            id="githubSignupBtn" 
                            style="width: 100%; padding: 1rem; background: #0F172A; border: 2px solid #0F172A; border-radius: var(--radius); font-size: 1rem; font-weight: 600; color: white; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 0.75rem;"
                            onmouseover="this.style.transform='translateY(-1px)'; this.style.boxShadow='0 6px 18px rgba(15,23,42,0.6)'"
                            onmouseout="this.style.transform='none'; this.style.boxShadow='none'"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                                <path fill="currentColor" d="M12 .5C5.648.5.5 5.648.5 12c0 5.086 3.292 9.387 7.868 10.907.575.111.786-.25.786-.556 0-.274-.01-1.002-.016-1.967-3.199.695-3.874-1.542-3.874-1.542-.523-1.328-1.278-1.682-1.278-1.682-1.044-.714.079-.699.079-.699 1.155.081 1.763 1.187 1.763 1.187 1.027 1.76 2.695 1.252 3.352.957.104-.744.402-1.252.732-1.54-2.553-.291-5.236-1.277-5.236-5.683 0-1.255.448-2.282 1.183-3.087-.119-.29-.513-1.463.112-3.051 0 0 .966-.309 3.166 1.179a10.96 10.96 0 0 1 2.884-.388c.978.005 1.963.132 2.884.388 2.199-1.488 3.164-1.179 3.164-1.179.626 1.588.232 2.761.114 3.051.737.805 1.182 1.832 1.182 3.087 0 4.418-2.688 5.389-5.25 5.675.414.357.781 1.062.781 2.141 0 1.545-.014 2.788-.014 3.167 0 .309.208.674.792.56C20.713 21.383 24 17.084 24 12 24 5.648 18.352.5 12 .5z"/>
                            </svg>
                            Sign up with GitHub
                        </button>
                    </div>
                </div>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in here</a></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        const API_BASE_URL = window.location.origin;

        // Password toggle functionality
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const passwordStrength = document.getElementById('passwordStrength');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.textContent = type === 'password' ? '👁️' : '🙈';
        });

        // Password validation: only allow digits, max 4 characters
        passwordInput.addEventListener('input', (e) => {
            let password = e.target.value;
            // Remove any non-digit characters
            password = password.replace(/[^0-9]/g, '');
            // Limit to 4 digits
            if (password.length > 4) {
                password = password.substring(0, 4);
            }
            e.target.value = password;
            
            // Update strength indicator
            if (password.length === 0) {
                passwordStrength.textContent = '';
                passwordStrength.className = '';
            } else if (password.length < 4) {
                passwordStrength.textContent = `Enter ${4 - password.length} more digit(s)`;
                passwordStrength.className = 'password-strength weak';
            } else if (password.length === 4) {
                passwordStrength.textContent = '✓ 4-digit PIN ready';
                passwordStrength.className = 'password-strength strong';
            }
        });

        // Prevent paste of non-numeric content
        passwordInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const pastedText = (e.clipboardData || window.clipboardData).getData('text');
            const digitsOnly = pastedText.replace(/[^0-9]/g, '').substring(0, 4);
            passwordInput.value = digitsOnly;
            passwordInput.dispatchEvent(new Event('input'));
        });

        // Signup form submission
        const signupForm = document.getElementById('signupForm');
        const signupBtn = document.getElementById('signupBtn');
        const signupBtnText = document.getElementById('signupBtnText');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function hideMessages() {
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
        }

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideMessages();

            const email = document.getElementById('email').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value.trim();

            // Validation
            if (!email || !username || !password) {
                showError('Please fill in all required fields');
                return;
            }

            if (username.length < 3 || username.length > 100) {
                showError('Username must be between 3 and 100 characters');
                return;
            }

            // Validate password: must be exactly 4 digits
            if (!/^[0-9]{4}$/.test(password)) {
                showError('Password must be exactly 4 digits (numbers 0-9 only)');
                return;
            }

            // Validate username format (letters, numbers, underscore, dot, hyphen)
            if (!/^[a-zA-Z0-9_.-]+$/.test(username)) {
                showError('Username can only contain letters, numbers, underscore (_), dot (.), and hyphen (-)');
                return;
            }

            // Disable button and show loading
            signupBtn.disabled = true;
            signupBtnText.innerHTML = '<span class="loading-spinner-small"></span>Creating account...';

            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        username: username,
                        password: password,
                        full_name: fullName || null
                    })
                });

                // Try to parse response as JSON, but handle non-JSON responses (like 500 errors)
                let data;
                let errorText = '';
                try {
                    const text = await response.text();
                    errorText = text;
                    if (text) {
                        data = JSON.parse(text);
                    } else {
                        data = null;
                    }
                } catch (parseError) {
                    // Response is not JSON (e.g., "Internal Server Error" plain text)
                    console.error('Failed to parse response as JSON:', errorText);
                    data = null;
                }

                if (response.ok && data) {
                    // Successful signup
                    showSuccess(data.message || 'Account created. Verification email sent (link + OTP). Please verify before login.');
                    
                    // Redirect to login page after short delay
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1800);
                } else {
                    // Handle 400/422 validation errors more clearly
                    let friendlyMessage = '';

                    // FastAPI 422 validation error structure: { detail: [ { loc, msg, type }, ... ] }
                    if (response.status === 422 && Array.isArray(data?.detail)) {
                        const details = data.detail;
                        const pwError = details.find(d => Array.isArray(d.loc) && d.loc.includes('password'));
                        if (pwError && typeof pwError.msg === 'string') {
                            if (pwError.msg.toLowerCase().includes('ensure this value has at least') || pwError.msg.toLowerCase().includes('ensure this value has at most')) {
                                friendlyMessage = 'Password must be exactly 4 digits (numbers 0-9 only).';
                            } else {
                                friendlyMessage = pwError.msg;
                            }
                        } else {
                            // Fallback: join all validation messages
                            friendlyMessage = details.map(d => d.msg).join(' / ');
                        }
                    }

                    // 400 errors from our backend (e.g., password too long, email/username exists)
                    if (!friendlyMessage && response.status === 400) {
                        if (typeof data?.detail === 'string') {
                            const detail = data.detail.toLowerCase();
                            // Check for duplicate user errors and show user-friendly message
                            if (detail.includes('email already registered') || detail.includes('email already exists')) {
                                friendlyMessage = 'This email is already registered. Please login instead or use a different email.';
                            } else if (detail.includes('username already taken') || detail.includes('username already exists')) {
                                friendlyMessage = 'This username is already taken. Please choose a different username.';
                            } else {
                                friendlyMessage = data.detail;
                            }
                        }
                    }

                    // Final fallback if still no message
                    const errorMsg = friendlyMessage || data?.detail || data?.message || errorText || 'Signup failed. Please try again.';
                    showError(errorMsg);
                    signupBtn.disabled = false;
                    signupBtnText.textContent = 'Create Account';
                }
            } catch (error) {
                console.error('Signup error:', error);
                showError('Network error. Please check your connection and try again.');
                signupBtn.disabled = false;
                signupBtnText.textContent = 'Create Account';
            }
        });

        // Google OAuth Signup Button
        const googleSignupBtn = document.getElementById('googleSignupBtn');
        if (googleSignupBtn) {
            googleSignupBtn.addEventListener('click', () => {
                // Redirect to backend Google OAuth endpoint, marking this as a signup flow.
                // Backend will prevent auto-login if the account already exists.
                window.location.href = `${API_BASE_URL}/api/auth/login/google?flow=signup`;
            });
        }

        // GitHub OAuth Signup Button
        const githubSignupBtn = document.getElementById('githubSignupBtn');
        if (githubSignupBtn) {
            githubSignupBtn.addEventListener('click', () => {
                // Redirect to backend GitHub OAuth endpoint, marking this as a signup flow.
                window.location.href = `${API_BASE_URL}/api/auth/login/github?flow=signup`;
            });
        }

        // Check if user is already logged in + show any OAuth signup errors
        window.addEventListener('DOMContentLoaded', () => {
            // If we were redirected back from Google signup and account exists,
            // show a friendly message instead of logging in.
            const params = new URLSearchParams(window.location.search);
            const errorParam = params.get('error');
            if (errorParam === 'account_exists') {
                showError('This email is already registered. Please login instead.');
            }

            const token = localStorage.getItem('auth_token');
            if (token) {
                // Verify token is still valid
                fetch(`${API_BASE_URL}/api/auth/verify`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
                .then(response => {
                    if (response.ok) {
                        // Token is valid, redirect to main page
                        window.location.href = 'index.html';
                    } else {
                        // Token is invalid, clear it
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('user_email');
                        localStorage.removeItem('user_username');
                        localStorage.removeItem('user_id');
                    }
                })
                .catch(() => {
                    // Error checking token, clear it
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('user_email');
                    localStorage.removeItem('user_username');
                    localStorage.removeItem('user_id');
                });
            }
        });
    </script>
</body>

</html>
