<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - Domain Classification Model</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .user-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            gap: 1.5rem;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .error-container {
            background: var(--danger-light);
            color: var(--danger);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--danger);
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <section class="section active">
        <div class="user-wrap">
            <div class="loading-container" id="loadingContainer">
                <div class="loading-spinner"></div>
                <div class="loading-text">Setting up your account...</div>
            </div>
            <div id="errorContainer" class="error-container" style="display: none;"></div>
        </div>
    </section>

    <script>
        /**
         * OAuth Cookie-to-LocalStorage Sync
         * 
         * After Google OAuth login, the backend sets an HttpOnly cookie with the JWT token.
         * This script reads that cookie and stores it in localStorage so the rest of the app
         * can use it (since localStorage is accessible to JavaScript, but HttpOnly cookies are not).
         * 
         * Flow:
         * 1. User clicks "Login with Google" -> redirected to Google
         * 2. Google redirects back -> backend sets cookie and redirects to /user.html or /admin.html
         * 3. This script runs -> reads cookie via API call -> stores in localStorage -> redirects to main app
         */

        const API_BASE_URL = window.location.origin;

        async function syncOAuthToken() {
            try {
                // Call the OAuth sync endpoint which reads the HttpOnly cookie and returns token + user info
                const syncResponse = await fetch(`${API_BASE_URL}/api/auth/oauth-sync`, {
                    method: 'GET',
                    credentials: 'include', // Important: sends cookies
                });

                if (!syncResponse.ok) {
                    const errorData = await syncResponse.json().catch(() => ({}));
                    throw new Error(errorData.detail || 'Failed to authenticate. Please try logging in again.');
                }

                const syncData = await syncResponse.json();
                
                // Store token and user info in localStorage (for compatibility with existing auth flow)
                if (syncData.access_token) {
                    localStorage.setItem('auth_token', syncData.access_token);
                    localStorage.setItem('user_email', syncData.email || '');
                    localStorage.setItem('user_username', syncData.username || syncData.name || 'user');
                    localStorage.setItem('user_id', syncData.user_id || '');
                    
                    // Redirect based on role
                    const role = syncData.role || 'user';
                    if (role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'index.html';
                    }
                } else {
                    throw new Error('Token not received from server.');
                }
            } catch (error) {
                console.error('OAuth sync error:', error);
                document.getElementById('loadingContainer').style.display = 'none';
                const errorContainer = document.getElementById('errorContainer');
                errorContainer.style.display = 'block';
                errorContainer.innerHTML = `
                    <h3>Authentication Error</h3>
                    <p>${error.message}</p>
                    <p style="margin-top: 1rem;">
                        <a href="login.html" style="color: var(--accent-primary); text-decoration: underline;">Go to Login</a>
                    </p>
                `;
            }
        }

        // Run sync on page load
        window.addEventListener('DOMContentLoaded', () => {
            syncOAuthToken();
        });
    </script>
</body>

</html>
